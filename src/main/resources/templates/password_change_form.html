<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymleaf.org" th:replace="base::Layout(~{::section})">
<head>
<meta charset="UTF-8">
<title>change password form</title>
</head>
<body>
	<section>
		<div id="login">
        <div class="container">
            <div id="login-row" class="row justify-content-center align-items-center">
                <div id="login-column" class="col-md-6">
                    <div id="login-box" style="height: 220px" class="col-md-12">
                        
                       <h1 class="mt-3">Enter New Password</h1>
                        
                        <form method="post" action="" th:action="@{/change-password}">
                        	<div class="form-group">
                        		<input name="newpassword" required="required" type="password" placeholder="Enter New Password" class="form-control"/>            		
                        	</div>
                        	<div class="container text-center">
                        	
                        	<button class="btn btn-primary">Change Password</button>
                        	
                        	</div>
                        	
                        
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
	</section>
</body>
</html>
